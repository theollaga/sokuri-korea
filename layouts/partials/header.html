<header class="site-header">
  <div class="site-container">
    <div class="header-inner">
      <h1 class="site-title"><a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a></h1>
      <nav class="site-nav">
        <ul>
          {{ range .Site.Menus.main }}
            {{ $label := .Name }}
            {{ with .Params.short }}{{ $label = . }}{{ end }}
            <li><a href="{{ .URL }}">{{ $label }}</a></li>
          {{ end }}
        </ul>
      </nav>
    </div>
  </div>
</header>
