<header class="site-header">
  <div class="site-container">
    <div class="header-top">
      <a href="{{ .Site.BaseURL }}" class="site-brand" aria-label="{{ .Site.Title }} home">
        <img src="https://img-korea.sk-sokuri.com/branding/logo-horizontal.webp"
             alt="{{ .Site.Title }} logo"
             class="site-logo"
             width="180" height="48"
             loading="eager"
             decoding="async">
      </a>
    </div>
    <nav class="site-nav">
      <ul>
        {{ range .Site.Menus.main }}
          {{ $label := .Name }}
          {{ with .Params.short }}{{ $label = . }}{{ end }}
          <li><a href="{{ .URL }}">{{ $label }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
