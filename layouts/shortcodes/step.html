{{- /*
  step — single step inside {{< steps >}}
  Usage:
    {{< step title="Step title" >}}
    Step description in markdown.
    {{< /step >}}
*/ -}}
{{- $title := .Get "title" -}}
<li class="step-item">
  {{ with $title }}<h3 class="step-title">{{ . }}</h3>{{ end }}
  <div class="step-body">{{ .Inner | $.Page.RenderString }}</div>
</li>
