{{ define "main" }}
<article class="page">
  <header class="page-header">
    <h1 class="page-title">{{ .Title }}</h1>
    {{ with .Description }}
      <p class="page-description">{{ . }}</p>
    {{ end }}
    {{ if .Lastmod }}
      <p class="page-updated">
        <em>Last updated: <time datetime="{{ .Lastmod.Format "2006-01-02" }}">{{ .Lastmod.Format "January 2, 2006" }}</time></em>
      </p>
    {{ end }}
  </header>

  <div class="page-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
