{{ define "main" }}
<div class="site-container">
  <header class="page-header">
    <h1 class="page-title">{{ .Title }}</h1>
    {{ if .Description }}
      <p class="page-description">{{ .Description }}</p>
    {{ end }}
  </header>

  <ul class="taxonomy-list">
    {{ range .Data.Terms }}
      <li>
        <a href="{{ .Page.Permalink }}">{{ .Page.Title }} ({{ .Count }})</a>
      </li>
    {{ end }}
  </ul>
</div>
{{ end }}
